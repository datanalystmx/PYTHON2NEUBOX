name: NBA Scrapers

on:
  schedule:
    # Scraper NBA — cada día a las 6:00 AM hora Ciudad de México (UTC-6 = 12:00 UTC)
    - cron: '0 12 * * *'
  workflow_dispatch:  # permite correrlo manualmente desde GitHub

jobs:

  # ── JOB 1: Scraper NBA (stats completas) ─────────────────────
  scraper_nba:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install nba_api requests pandas pytz openpyxl

      - name: Correr Scraper NBA
        env:
          FTP_HOST: ftp.nexus-core.com.mx
          FTP_USER: ftpdata@nexus-core.com.mx
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: python Scraper_NBA.py

  # ── JOB 2: Injury Scraper ────────────────────────────────────
  scraper_injuries:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests pdfplumber

      - name: Correr Injury Scraper
        env:
          FTP_HOST: ftp.nexus-core.com.mx
          FTP_USER: ftpdata@nexus-core.com.mx
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: python injury_scraper.py
